server:
  port: 9000

spring:
  application:
    name: omc-backend
  datasource:
    url: jdbc:mysql://localhost:3306/pai?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

omc:
  upload:
    path: /data/omc/upload
  sync:
    interval-days: 10
  device:
    search-timeout: 5000

knife4j:
  enable: true
